version: "3"

tasks:
  oci:login:
    desc: "Authenticate OCI session"
    cmds:
      - oci session authenticate

  oci-platform:generate-dns-keys:
    desc: "Step 0. Generate key pair for ExternalDNS"
    cmds:
      - echo "Generating key pair for ExternalDNS"
      - rm -rf ./.keys/dns
      - mkdir -p ./.keys/dns
      - openssl genrsa -out .keys/dns/oci_api_key.pem 2048
      - openssl rsa -pubout -in .keys/dns/oci_api_key.pem -out .keys/dns/oci_api_key_public.pem
      - openssl rsa -pubout -outform DER -in .keys/dns/oci_api_key.pem | openssl md5 -c | sed 's/^.*= //' > .keys/dns/fingerprint.txt
      - echo "Keys generated in .keys/dns/ directory"

  oci-platform:generate-ssh-keys:
    desc: "Step 0. Generate SSH key pair for OKE worker nodes"
    cmds:
      - echo "Generating SSH key pair for OKE worker nodes"
      - rm -rf ./.keys/ssh
      - mkdir -p ./.keys/ssh
      - ssh-keygen -t ed25519 -f .keys/ssh/id_ed25519 -N '' -C oke-worker
      - echo "SSH keys generated in .keys/ssh/ directory"

  oci-platform:install-network:
    desc: "Step 1. Install network layer"
    dir: 01-network
    cmds:
      - echo "Installing network layer..."
      - tofu init
      - tofu apply

  oci-platform:install-identity:
    desc: "Step 2. Install identity layer"
    dir: 02-identity
    cmds:
      - echo "Installing identity layer..."
      - |
        PUBLIC_KEY=$(cat ../.keys/dns/oci_api_key_public.pem)
        tofu init
        tofu apply -var="oci_api_public_key=$PUBLIC_KEY"

  oci-platform:install-oke:
    desc: "Step 3. Install OKE cluster"
    dir: 03-oke
    cmds:
      - echo "Installing OKE..."
      - |
        SSH_PUBLIC_KEY=$(cat ../.keys/ssh/id_ed25519.pub)
        tofu init
        tofu apply -var="ssh_public_key=$SSH_PUBLIC_KEY"

  oci-platform:install-dns:
    desc: "Step 4. Install DNS"
    dir: 04-dns
    cmds:
      - echo "Installing DNS..."
      - |
        tofu init
        tofu apply

  oci-platform:install-vpn:
    desc: "Step 5. Install VPN"
    dir: 05-vpn
    cmds:
      - echo "Installing VPN..."
      - tofu init
      - tofu apply

  oci-platform:install-cert-manager:
    desc: "Step 6. Install cert-manager"
    dir: 06-cert-manager
    cmds:
      - echo "Installing cert-manager..."
      - tofu init
      - tofu apply

  oci-platform:install-nginx-gateway:
    desc: "Step 7. Install NGINX Gateway"
    dir: 07-nginx-gateway
    cmds:
      - echo "Installing NGINX Gateway..."
      - tofu init
      - tofu apply

  oci-platform:install-external-dns:
    desc: "Step 8. Install ExternalDNS"
    dir: 08-external-dns
    cmds:
      - echo "Installing ExternalDNS..."
      - |
        PRIVATE_KEY=$(cat ../.keys/dns/oci_api_key.pem)
        FINGERPRINT=$(cat ../.keys/dns/fingerprint.txt)
        tofu init
        tofu apply \
          -var="oci_api_private_key=$PRIVATE_KEY" \
          -var="oci_api_private_key_fingerprint=$FINGERPRINT"

  oci-platform:install-external-secrets:
    desc: "Step 9. Install ExternalSecrets"
    dir: 09-external-secrets
    cmds:
      - echo "Installing ExternalSecrets..."
      - |
        PRIVATE_KEY=$(cat ../.keys/dns/oci_api_key.pem)
        FINGERPRINT=$(cat ../.keys/dns/fingerprint.txt)
        tofu init
        tofu apply -exclude="module.external-secrets.kubernetes_manifest.oci_secret_store" \
          -var="oci_api_private_key=$PRIVATE_KEY" \
          -var="oci_api_private_key_fingerprint=$FINGERPRINT"
        tofu apply \
          -var="oci_api_private_key=$PRIVATE_KEY" \
          -var="oci_api_private_key_fingerprint=$FINGERPRINT"

  oci-platform:install-gitlab-agent:
    desc: "Step 10. Install GitLab Agent"
    dir: "10-gitlab-agent"
    cmds:
      - echo "Installing GitLab Agent..."
      - tofu init
      - tofu apply

  oci-platform:install-filesystem-storage-class:
    desc: "Step 11. Install OCI File Storage storage class"
    dir: "11-filesystem-storage-class"
    cmds:
      - echo "Installing OCI File Storage storage class..."
      - tofu init
      - tofu apply
